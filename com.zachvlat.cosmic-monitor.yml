app-id: com.zachvlat.cosmic-monitor
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: cosmic-monitor
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=host
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cosmic-monitor/cargo
modules:
  - name: cosmic-monitor
    buildsystem: simple
    build-commands:
      - cargo build --release --manifest-path=Cargo.toml
      - install -Dm755 target/release/cosmic-monitor /app/bin/cosmic-monitor
      - install -Dm644 resources/app.desktop /app/share/applications/com.zachvlat.cosmic-monitor.desktop
      - install -Dm644 resources/app.metainfo.xml /app/share/metainfo/com.zachvlat.cosmic-monitor.metainfo.xml
      - install -Dm644 resources/icons/hicolor/scalable/apps/icon.svg /app/share/icons/hicolor/scalable/apps/com.zachvlat.cosmic-monitor.svg
    sources:
      - type: dir
        path: .
